<!DOCTYPE html>
<html lang="it" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Produx Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-base:    #0e0907;
    --bg-surface: #160c09;
    --bg-card:    #1e110d;
    --bg-hover:   #271610;
    --border:     #3a1f15;
    --border-lit: #4e2a1c;
    --accent:     #f97316;
    --accent2:    #ef4444;
    --accent-dim: #7c2d12;
    --accent-glow:rgba(249,115,22,.15);
    --grad:       linear-gradient(135deg, #f97316 0%, #ef4444 100%);
    --grad-v:     linear-gradient(180deg, #f97316 0%, #ef4444 100%);
    --grad-text:  linear-gradient(90deg, #f97316 0%, #ef4444 100%);
    --text-primary:  #f7ede8;
    --text-secondary:#a08070;
    --text-muted:    #5c3a2e;
    --green:  #34d399;
    --red:    #f87171;
    --blue:   #60a5fa;
    --purple: #a78bfa;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
    --radius: 8px;
    --sidebar-w: 220px;
    --transition: .18s cubic-bezier(.4,0,.2,1);
    --nav-h: 62px;
  }
  .light {
    --bg-base:    #fef5f0;
    --bg-surface: #fdeee6;
    --bg-card:    #fae3d8;
    --bg-hover:   #f5d5c5;
    --border:     #e8c4b0;
    --border-lit: #d9b09a;
    --accent-dim: #fecba8;
    --accent-glow:rgba(249,115,22,.10);
    --text-primary:  #1a0c08;
    --text-secondary:#6a3c2c;
    --text-muted:    #b08878;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-mono);
    background: var(--bg-base);
    color: var(--text-primary);
    font-size: 13px;
    line-height: 1.6;
    transition: background var(--transition), color var(--transition);
    overflow: hidden;
  }
  button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; background: none; border: none; outline: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 2px; }

  /* ══ LAYOUT ══ */
  #app { display: flex; height: 100vh; }

  /* ══ SIDEBAR ══ */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    transition: background var(--transition);
  }
  .sidebar-logo {
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .sidebar-logo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--grad);
    opacity: .06;
    pointer-events: none;
  }
  .logo-mark {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-heart {
    font-size: 14px;
    -webkit-text-fill-color: initial;
    filter: drop-shadow(0 0 5px rgba(239,68,68,.6));
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  .logo-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--grad);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)} 14%{transform:scale(1.22)} 28%{transform:scale(1)} 42%{transform:scale(1.14)} 56%{transform:scale(1)}
  }
  @keyframes pulse-dot {
    0%,100%{box-shadow:0 0 4px var(--accent)} 50%{box-shadow:0 0 14px var(--accent2)}
  }
  .logo-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .logo-dedication {
    margin-top: 10px;
    padding: 7px 10px;
    border-radius: 6px;
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.2);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-secondary);
  }
  .logo-dedication .ded-heart { font-size: 11px; filter: drop-shadow(0 0 4px rgba(239,68,68,.7)); animation: heartbeat 1.4s ease-in-out infinite; }
  .logo-dedication strong { background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }

  .nav-section { padding: 12px 10px 4px; flex: 1; overflow-y: auto; }
  .nav-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); padding: 0 8px; margin-bottom: 6px; margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: var(--radius);
    color: var(--text-secondary); cursor: pointer;
    transition: all var(--transition); position: relative;
    font-size: 12.5px; font-weight: 500; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent); border-color: rgba(249,115,22,.25); }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 3px; background: var(--grad-v); border-radius: 0 3px 3px 0; box-shadow: 0 0 8px var(--accent);
  }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

  .sidebar-footer { border-top: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; }
  .time-display { font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .toggle-dark { width: 36px; height: 20px; background: var(--bg-hover); border: 1px solid var(--border-lit); border-radius: 10px; position: relative; cursor: pointer; transition: background var(--transition); flex-shrink: 0; }
  .toggle-dark.on { background: var(--accent-dim); border-color: var(--accent); }
  .toggle-dark .knob { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--text-secondary); transition: transform var(--transition), background var(--transition); }
  .toggle-dark.on .knob { transform: translateX(16px); background: var(--accent); }

  /* ══ MAIN ══ */
  #main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
  .topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg-surface); flex-shrink: 0; }
  .topbar-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .topbar-meta { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; margin-top: 1px; }
  .content-area { flex: 1; overflow-y: auto; padding: 24px; }

  /* ══ MOBILE TOPBAR ══ */
  #mob-topbar {
    display: none;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .mob-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    background: var(--grad-text);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex; align-items: center; gap: 6px;
  }
  .mob-logo-heart { font-size: 14px; -webkit-text-fill-color: initial; animation: heartbeat 1.4s ease-in-out infinite; }
  .mob-page-title { font-family: var(--font-display); font-size: 13px; font-weight: 700; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  /* ══ MOBILE BOTTOM NAV ══ */
  #mob-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--bg-surface);
    border-top: 1px solid var(--border);
    z-index: 100;
    align-items: center;
    justify-content: space-around;
    padding: 0 4px;
  }
  .mob-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 6px 2px; border-radius: var(--radius);
    color: var(--text-muted); cursor: pointer;
    transition: color var(--transition); font-size: 9px; letter-spacing: .5px; text-transform: uppercase;
  }
  .mob-item svg { width: 20px; height: 20px; }
  .mob-item.active { color: var(--accent); }

  /* ══ RESPONSIVE ══ */
  @media (max-width: 680px) {
    #sidebar { display: none !important; }
    #mob-nav { display: flex; }
    #mob-topbar { display: flex; }
    .topbar { display: none; }
    #main { padding-bottom: var(--nav-h); }
    .content-area { padding: 14px; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .notes-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .sticky-card { min-height: 130px; }
    .timer-ring-container { width: 180px !important; height: 180px !important; }
    .timer-digits { font-size: 38px !important; }
    .cal-cell { min-height: 36px; padding: 4px 2px 2px; }
    .cal-day-num { font-size: 10px; }
    .todo-add-row { flex-wrap: wrap; }
    .todo-add-row .todo-select { order: 2; width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; }
    .todo-add-row .btn-primary { order: 3; }
    .event-add-row { flex-wrap: wrap; }
    .event-add-row .btn-primary { width: 100%; }
    .cal-month-label { font-size: 16px; }
  }
  @media (min-width: 681px) and (max-width: 960px) {
    :root { --sidebar-w: 58px; }
    .nav-item span, .nav-label, .logo-dedication, .logo-sub { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .nav-item.active::before { display: none; }
    .logo-mark { justify-content: center; font-size: 0; }
    .logo-dot { display: block; margin: 8px auto; }
    .logo-heart { display: none; }
    .sidebar-logo { padding: 12px 8px; }
    .sidebar-footer { justify-content: center; padding: 12px 8px; }
    .time-display { display: none; }
  }

  /* ══ OVERVIEW ══ */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; transition: border-color var(--transition); }
  .stat-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--accent-glow), transparent 60%); opacity: 0; transition: opacity var(--transition); pointer-events: none; }
  .stat-card:hover { border-color: var(--accent-dim); }
  .stat-card:hover::after { opacity: 1; }
  .stat-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 28px; font-weight: 800; }
  .stat-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .stat-icon { position: absolute; top: 14px; right: 14px; opacity: .12; }

  /* ══ CALENDAR ══ */
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cal-month-label { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
  .cal-nav-btn { width: 32px; height: 32px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all var(--transition); }
  .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-label { text-align: center; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); padding: 6px 0; }
  .cal-cell { aspect-ratio: 1; border-radius: 6px; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 5px 3px 3px; cursor: pointer; transition: all var(--transition); min-height: 44px; background: var(--bg-card); }
  .cal-cell:hover { border-color: var(--border-lit); background: var(--bg-hover); }
  .cal-cell.oggi { border-color: var(--accent); background: var(--accent-glow); }
  .cal-cell.selezionato { box-shadow: 0 0 0 2px var(--accent); }
  .cal-cell.altro-mese .cal-day-num { color: var(--text-muted); }
  .cal-day-num { font-size: 12px; font-weight: 600; line-height: 1; margin-bottom: 2px; }
  .cal-cell.oggi .cal-day-num { color: var(--accent); }
  .event-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin: 1px 0; }
  .event-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 14px; }
  .event-panel-title { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .event-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .event-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--bg-surface); border-radius: 6px; border: 1px solid var(--border); animation: slideIn .15s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .event-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .event-item-text { flex: 1; font-size: 12px; }
  .event-delete { color: var(--text-muted); padding: 2px; border-radius: 4px; transition: color var(--transition); }
  .event-delete:hover { color: var(--red); }
  .event-add-row { display: flex; gap: 8px; }
  .event-input { flex: 1; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 12px; transition: border-color var(--transition); }
  .event-input:focus { border-color: var(--accent); }
  .color-picker { display: flex; gap: 4px; align-items: center; }
  .color-swatch { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform var(--transition); }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.sel { border-color: var(--text-primary); }
  .btn-primary { background: var(--grad); color: #fff; font-weight: 700; font-size: 12px; padding: 7px 14px; border-radius: 6px; transition: opacity var(--transition); white-space: nowrap; }
  .btn-primary:hover { opacity: .85; }

  /* ══ TIMER ══ */
  .timer-wrapper { display: flex; flex-direction: column; align-items: center; padding: 24px 0 16px; max-width: 380px; margin: 0 auto; }
  .timer-mode-tabs { display: flex; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; margin-bottom: 28px; }
  .timer-tab { padding: 6px 18px; border-radius: 5px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-secondary); transition: all var(--transition); font-weight: 600; cursor: pointer; }
  .timer-tab.active { background: var(--grad); color: #fff; }
  .timer-ring-container { position: relative; margin-bottom: 28px; }
  .timer-svg { transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: var(--bg-card); stroke-width: 8; }
  .timer-progress { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1s linear; filter: drop-shadow(0 0 8px var(--accent)); }
  .timer-progress.pausa { stroke: var(--green); filter: drop-shadow(0 0 8px var(--green)); }
  .timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .timer-digits { font-family: var(--font-display); font-size: 46px; font-weight: 800; letter-spacing: -2px; font-variant-numeric: tabular-nums; line-height: 1; }
  .timer-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }
  .timer-controls { display: flex; gap: 12px; }
  .timer-btn { width: 52px; height: 52px; border-radius: 50%; border: 1px solid var(--border-lit); background: var(--bg-card); display: flex; align-items: center; justify-content: center; color: var(--text-primary); transition: all var(--transition); }
  .timer-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .timer-btn.primary-btn { width: 64px; height: 64px; background: var(--grad); border-color: transparent; color: #fff; box-shadow: 0 0 20px var(--accent-glow); }
  .timer-btn.primary-btn:hover { opacity: .9; transform: scale(1.04); }
  .timer-sessions { margin-top: 24px; display: flex; gap: 6px; align-items: center; }
  .session-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-lit); transition: all var(--transition); }
  .session-dot.fatto { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .session-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-left: 4px; }
  .session-count-text { font-size: 11px; color: var(--text-muted); margin-top: 8px; }

  /* ══ TODO ══ */
  .todo-add-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .todo-input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; transition: border-color var(--transition); }
  .todo-input:focus { border-color: var(--accent); }
  .todo-select { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 0 10px; font-family: var(--font-mono); font-size: 12px; cursor: pointer; }
  .todo-section-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .todo-count-badge { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--text-secondary); }
  .todo-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); transition: all var(--transition); animation: slideIn .18s ease; }
  .todo-item:hover { border-color: var(--border-lit); }
  .todo-item.completato { opacity: .45; border-color: transparent; }
  .todo-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-lit); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all var(--transition); color: transparent; }
  .todo-check:hover { border-color: var(--green); color: var(--green); }
  .todo-check.checked { background: var(--green); border-color: var(--green); color: #0d0d0f; }
  .todo-text { flex: 1; font-size: 13px; }
  .todo-text.barrato { text-decoration: line-through; color: var(--text-muted); }
  .todo-priority { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .todo-delete { color: var(--text-muted); opacity: 0; transition: opacity var(--transition); padding: 2px; }
  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-delete:hover { color: var(--red); }
  .todo-empty { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; border: 1px dashed var(--border); border-radius: var(--radius); }

  /* ══ NOTE ══ */
  .notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .sticky-card { border-radius: 10px; padding: 14px; min-height: 150px; display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,.1); box-shadow: 0 4px 16px rgba(0,0,0,.18); transition: transform var(--transition), box-shadow var(--transition); animation: noteAppear .2s ease; }
  @keyframes noteAppear { from{opacity:0;transform:scale(.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .sticky-card:hover { transform: translateY(-3px) rotate(.4deg); box-shadow: 0 8px 28px rgba(0,0,0,.24); }
  .sticky-toolbar { display: flex; align-items: center; gap: 4px; margin-bottom: 10px; }
  .note-swatch { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(0,0,0,.15); transition: transform var(--transition); flex-shrink: 0; }
  .note-swatch:hover { transform: scale(1.3); }
  .note-swatch.attivo { border-color: rgba(0,0,0,.45); transform: scale(1.2); }
  .note-delete-btn { margin-left: auto; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.12); display: flex; align-items: center; justify-content: center; color: rgba(0,0,0,.5); transition: all var(--transition); }
  .note-delete-btn:hover { background: rgba(0,0,0,.25); }
  .note-content { flex: 1; resize: none; background: transparent; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.65; color: rgba(0,0,0,.75); width: 100%; min-height: 80px; }
  .note-content::placeholder { color: rgba(0,0,0,.3); }
  .note-timestamp { font-size: 9px; color: rgba(0,0,0,.35); margin-top: 8px; }
  .add-note-card { border-radius: 10px; min-height: 150px; border: 2px dashed var(--border-lit); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition); color: var(--text-muted); font-size: 12px; gap: 8px; }
  .add-note-card:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
</style>
</head>
<body>
<div id="app">

  <!-- ══ SIDEBAR (desktop) ══ -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <span class="logo-dot"></span>
        PRODUX
        <span class="logo-heart"></span>

      <div class="logo-sub">DASHBOARD v2.0</div>
      <div class="logo-dedication">
        <span class="ded-heart"></span>
        <span>Fatto con amore</span>
      </div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Area di lavoro</div>
      <div class="nav-item active" data-view="overview">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Panoramica</span>
      </div>
      <div class="nav-item" data-view="calendar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendario</span>
      </div>

        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

      <div class="nav-item" data-view="todo">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span>Attività</span>
      </div>
      <div class="nav-item" data-view="notes">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <span>Note</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="time-display" id="clock">--:--</div>
      <button class="toggle-dark on" id="darkToggle"><div class="knob"></div></button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div id="main">
    <!-- Topbar desktop -->
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Panoramica</div>
        <div class="topbar-meta" id="topbarDate">Caricamento...</div>
      </div>
    </div>
    <!-- Topbar mobile -->
    <div id="mob-topbar">
      <div class="mob-logo">
        <span class="mob-logo-heart">🧡</span>
        PRODUX
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="mob-page-title" id="mobTitle">Panoramica</div>
        <button class="toggle-dark on" id="darkToggleMob"><div class="knob"></div></button>
      </div>
    </div>
    <div class="content-area" id="contentArea"></div>
  </div>

  <!-- ══ BOTTOM NAV (mobile) ══ -->
  <nav id="mob-nav">
    <div class="mob-item active" data-view="overview">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Home
    </div>
    <div class="mob-item" data-view="calendar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendario
    </div>

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Timer

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Attività
    </div>
    <div class="mob-item" data-view="notes">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Note
    </div>
  </nav>
</div>

<script>
/* ═══════════════════════════════
   PRODUTTIVITY SERVICE
═══════════════════════════════ */
const Store = {
  get: k => { try { return JSON.parse(localStorage.getItem('produx_'+k)); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem('produx_'+k, JSON.stringify(v)); } catch {} },
};
function signal(v0) {
  let _v = v0; const fns = new Set();
  return { get value(){ return _v; }, set(v){ _v=v; fns.forEach(f=>f(v)); }, subscribe(f){ fns.add(f); } };
}

const darkMode   = signal(Store.get('darkMode') ?? true);
const events     = signal(Store.get('events')   ?? {});
const todos      = signal(Store.get('todos')    ?? []);
const notes      = signal(Store.get('notes')    ?? []);
const timerState = signal({ mode:'focus', running:false, remaining:25*60, sessions:0 });

events.subscribe(v => Store.set('events',v));
todos.subscribe(v  => Store.set('todos',v));
notes.subscribe(v  => Store.set('notes',v));
darkMode.subscribe(v => {
  Store.set('darkMode',v);
  document.documentElement.classList.toggle('dark',v);
  document.documentElement.classList.toggle('light',!v);
  document.querySelectorAll('.toggle-dark').forEach(b => b.classList.toggle('on',v));
});

// Init tema
document.documentElement.classList.toggle('dark', darkMode.value);
document.documentElement.classList.toggle('light', !darkMode.value);
document.querySelectorAll('.toggle-dark').forEach(b => {
  b.classList.toggle('on', darkMode.value);
  b.addEventListener('click', () => darkMode.set(!darkMode.value));
});

// Orologio
function aggiornaOrologio() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}
setInterval(aggiornaOrologio, 1000);
aggiornaOrologio();

const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const GIORNI = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

document.getElementById('topbarDate').textContent =
  new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

/* ═══════════════════════════════
   ROUTER
═══════════════════════════════ */
const VISTE = {
  overview: { titolo:'Panoramica',  render:renderOverview },
  calendar: { titolo:'Calendario',  render:renderCalendar },
  timer:    { titolo:'Timer Focus', render:renderTimer },
  todo:     { titolo:'Attività',    render:renderTodo },
  notes:    { titolo:'Note',        render:renderNote },
};

function naviga(v) {
  document.querySelectorAll('[data-view]').forEach(el =>
    el.classList.toggle('active', el.dataset.view === v));
  const titolo = VISTE[v].titolo;
  document.getElementById('topbarTitle').textContent = titolo;
  document.getElementById('mobTitle').textContent = titolo;
  const area = document.getElementById('contentArea');
  area.innerHTML = '';
  VISTE[v].render(area);
}

document.querySelectorAll('[data-view]').forEach(el =>
  el.addEventListener('click', () => naviga(el.dataset.view)));

/* ═══════════════════════════════
   PANORAMICA
═══════════════════════════════ */
function renderOverview(root) {
  const attivi = todos.value.filter(t=>!t.done).length;
  const fatti  = todos.value.filter(t=>t.done).length;
  const nNote  = notes.value.length;
  const oggiK  = chiaveData(new Date());
  const evOggi = (events.value[oggiK]||[]).length;

  root.innerHTML = `
    <div class="overview-grid">
      <div class="stat-card">
        <div class="stat-label">Attività attive</div>
        <div class="stat-value" style="color:var(--accent)">${attivi}</div>
        <div class="stat-sub">${fatti} completate</div>
        <svg class="stat-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <div class="stat-card">
        <div class="stat-label">Eventi di oggi</div>
        <div class="stat-value" style="color:var(--blue)">${evOggi}</div>
        <div class="stat-sub">programmati oggi</div>
        <svg class="stat-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="stat-card">
        <div class="stat-label">Note salvate</div>
        <div class="stat-value" style="color:var(--purple)">${nNote}</div>
        <div class="stat-sub">promemoria attivi</div>
        <svg class="stat-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sessioni Pomodoro</div>
        <div class="stat-value" style="color:var(--green)">${timerState.value.sessions}</div>
        <div class="stat-sub">completate oggi</div>
        <svg class="stat-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
    </div>
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px">
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px">Accesso rapido</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${[['calendar','Calendario'],['timer','Timer Focus'],['todo','Attività'],['notes','Note']].map(([v,n])=>`
          <button onclick="naviga('${v}')" style="background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;padding:10px 16px;font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);cursor:pointer;transition:.18s"
            onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'"
            onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-secondary)'">${n} →</button>`).join('')}
      </div>
    </div>`;
}

/* ═══════════════════════════════
   CALENDARIO
═══════════════════════════════ */
let calData = new Date();
let dataSelezionata = null;
let coloreEvento = '#f97316';

function chiaveData(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderCalendar(root) {
  const anno = calData.getFullYear(), mese = calData.getMonth();
  const oggi = new Date(), oggiK = chiaveData(oggi);
  const selK = dataSelezionata ? chiaveData(dataSelezionata) : null;

  let inizioSett = new Date(anno, mese, 1).getDay();
  inizioSett = inizioSett === 0 ? 6 : inizioSett - 1;
  const giorniMese = new Date(anno, mese+1, 0).getDate();
  const giorniPrec = new Date(anno, mese, 0).getDate();

  const celle = [];
  for (let i=inizioSett-1; i>=0; i--)
    celle.push({g:giorniPrec-i, altro:true, d:new Date(anno,mese-1,giorniPrec-i)});
  for (let d=1; d<=giorniMese; d++)
    celle.push({g:d, altro:false, d:new Date(anno,mese,d)});
  while (celle.length%7!==0)
    celle.push({g:celle.length-giorniMese-inizioSett+1, altro:true, d:null});

  const evMap = events.value;
  const celleHTML = celle.map(c => {
    const k = c.d ? chiaveData(c.d) : null;
    const evts = k && evMap[k] ? evMap[k] : [];
    const dots = evts.slice(0,3).map(e=>`<div class="event-dot" style="background:${e.color}"></div>`).join('');
    return `<div class="cal-cell ${c.altro?'altro-mese':''} ${k===oggiK?'oggi':''} ${k===selK?'selezionato':''}"
      data-date="${c.d?c.d.toISOString():''}">
      <span class="cal-day-num">${c.g}</span>${dots}
    </div>`;
  }).join('');

  const selEvts = selK && evMap[selK] ? evMap[selK] : [];
  const swatches = ['#f97316','#60a5fa','#34d399','#f87171','#a78bfa'].map(col=>
    `<div class="color-swatch${col===coloreEvento?' sel':''}" style="background:${col}" data-col="${col}"></div>`).join('');

  root.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav-btn" id="prevMese"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="cal-month-label">${MESI[mese]} ${anno}</div>
      <button class="cal-nav-btn" id="nextMese"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="cal-grid">
      ${GIORNI.map(g=>`<div class="cal-day-label">${g}</div>`).join('')}
      ${celleHTML}
    </div>
    <div class="event-panel">
      <div class="event-panel-title">${selK ? `eventi del ${dataSelezionata.toLocaleDateString('it-IT',{day:'numeric',month:'long'})}` : 'seleziona un giorno'}</div>
      ${selK ? `
        <div class="event-list">
          ${selEvts.length ? selEvts.map((e,i)=>`
            <div class="event-item">
              <div class="event-color-dot" style="background:${e.color}"></div>
              <span class="event-item-text">${e.text}</span>
              <button class="event-delete" data-idx="${i}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
            </div>`).join('') : '<div style="font-size:12px;color:var(--text-muted)">Nessun evento. Aggiungine uno.</div>'}
        </div>
        <div class="event-add-row">
          <input class="event-input" id="evtInput" placeholder="Nuovo evento…"/>
          <div class="color-picker">${swatches}</div>
          <button class="btn-primary" id="addEvtBtn">Aggiungi</button>
        </div>` : '<div style="font-size:12px;color:var(--text-muted)">Clicca su un giorno per gestire gli eventi.</div>'}
    </div>`;

  root.querySelectorAll('.cal-cell').forEach(el =>
    el.addEventListener('click', () => {
      if (!el.dataset.date) return;
      dataSelezionata = new Date(el.dataset.date);
      renderCalendar(root);
    }));
  root.querySelector('#prevMese')?.addEventListener('click', () => { calData=new Date(calData.getFullYear(),calData.getMonth()-1,1); renderCalendar(root); });
  root.querySelector('#nextMese')?.addEventListener('click', () => { calData=new Date(calData.getFullYear(),calData.getMonth()+1,1); renderCalendar(root); });
  root.querySelectorAll('.color-swatch').forEach(sw => sw.addEventListener('click', () => { coloreEvento=sw.dataset.col; renderCalendar(root); }));
  root.querySelector('#addEvtBtn')?.addEventListener('click', () => {
    const inp = root.querySelector('#evtInput');
    const txt = inp?.value.trim();
    if (!txt||!selK) return;
    const cur = {...events.value};
    cur[selK] = [...(cur[selK]||[]), {text:txt, color:coloreEvento}];
    events.set(cur); renderCalendar(root);
  });
  root.querySelector('#evtInput')?.addEventListener('keydown', e => { if(e.key==='Enter') root.querySelector('#addEvtBtn')?.click(); });
  root.querySelectorAll('.event-delete').forEach(btn => btn.addEventListener('click', () => {
    const idx=parseInt(btn.dataset.idx);
    const cur={...events.value};
    cur[selK]=cur[selK].filter((_,i)=>i!==idx);
    events.set(cur); renderCalendar(root);
  }));
}

/* ═══════════════════════════════
   TIMER
═══════════════════════════════ */
let timerInterval = null;

function renderTimer(root) {
  const s = timerState.value;
  const isMob = window.innerWidth <= 680;
  const SZ = isMob ? 180 : 220;
  const R  = isMob ? 78  : 96;
  const circ = 2*Math.PI*R;
  const offset = circ*(1-s.remaining/(s.mode==='focus'?25*60:5*60));
  const mm = String(Math.floor(s.remaining/60)).padStart(2,'0');
  const ss = String(s.remaining%60).padStart(2,'0');
  const isPausa = s.mode==='break';
  const dots = Array.from({length:4},(_,i)=>`<div class="session-dot${i<s.sessions%4?' fatto':''}"></div>`).join('');

  root.innerHTML=`
    <div class="timer-wrapper">
      <div class="timer-mode-tabs">
        <div class="timer-tab${!isPausa?' active':''}" data-mode="focus">Focus</div>
        <div class="timer-tab${isPausa?' active':''}" data-mode="break">Pausa</div>
      </div>
      <div class="timer-ring-container" style="width:${SZ}px;height:${SZ}px">
        <svg class="timer-svg" width="${SZ}" height="${SZ}" viewBox="0 0 ${SZ} ${SZ}">
          <circle class="timer-track" cx="${SZ/2}" cy="${SZ/2}" r="${R}"/>
          <circle class="timer-progress${isPausa?' pausa':''}" cx="${SZ/2}" cy="${SZ/2}" r="${R}"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-digits" style="font-size:${isMob?'38px':'46px'}">${mm}:${ss}</div>
          <div class="timer-label">${isPausa?'PAUSA':'FOCUS'}</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerReset" title="Ricomincia">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.22"/></svg>
        </button>
        <button class="timer-btn primary-btn" id="timerPlay">
          ${s.running
            ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
            : `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`}
        </button>
        <button class="timer-btn" id="timerSkip" title="Salta">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
      <div class="timer-sessions">${dots}<span class="session-label">SESSIONI</span></div>
      <div class="session-count-text">Totale completate: <strong>${s.sessions}</strong></div>
    </div>`;

  root.querySelectorAll('.timer-tab').forEach(tab => tab.addEventListener('click', () => {
    clearInterval(timerInterval); timerInterval=null;
    const m=tab.dataset.mode;
    timerState.set({...timerState.value, mode:m, running:false, remaining:m==='focus'?25*60:5*60});
    renderTimer(root);
  }));

  root.querySelector('#timerPlay').addEventListener('click', () => {
    if (timerState.value.running) {
      clearInterval(timerInterval); timerInterval=null;
      timerState.set({...timerState.value, running:false});
      renderTimer(root);
    } else {
      timerState.set({...timerState.value, running:true});
      const cM = 2*Math.PI*R;
      timerInterval = setInterval(() => {
        const st=timerState.value;
        if (st.remaining<=0) {
          clearInterval(timerInterval); timerInterval=null;
          const nm=st.mode==='focus'?'break':'focus';
          const ns=st.mode==='focus'?st.sessions+1:st.sessions;
          timerState.set({mode:nm,running:false,remaining:nm==='focus'?25*60:5*60,sessions:ns});
          renderTimer(root); return;
        }
        timerState.set({...st,remaining:st.remaining-1});
        const tv=timerState.value;
        const d=root.querySelector('.timer-digits');
        if(d) d.textContent=`${String(Math.floor(tv.remaining/60)).padStart(2,'0')}:${String(tv.remaining%60).padStart(2,'0')}`;
        const p=root.querySelector('.timer-progress');
        if(p) p.style.strokeDashoffset=cM*(1-tv.remaining/(st.mode==='focus'?25*60:5*60));
      },1000);
      renderTimer(root);
    }
  });

  root.querySelector('#timerReset').addEventListener('click', () => {
    clearInterval(timerInterval); timerInterval=null;
    const m=timerState.value.mode;
    timerState.set({...timerState.value,running:false,remaining:m==='focus'?25*60:5*60});
    renderTimer(root);
  });
  root.querySelector('#timerSkip').addEventListener('click', () => {
    clearInterval(timerInterval); timerInterval=null;
    const st=timerState.value, nm=st.mode==='focus'?'break':'focus';
    timerState.set({mode:nm,running:false,remaining:nm==='focus'?25*60:5*60,sessions:st.mode==='focus'?st.sessions+1:st.sessions});
    renderTimer(root);
  });
}

/* ═══════════════════════════════
   ATTIVITÀ
═══════════════════════════════ */
const PRIORITA = {alta:'#f87171', media:'#f97316', bassa:'#34d399'};

function renderTodo(root) {
  const attivi = todos.value.filter(t=>!t.done);
  const fatti  = todos.value.filter(t=>t.done);

  const lista = items => items.map(t=>`
    <div class="todo-item${t.done?' completato':''}">
      <button class="todo-check${t.done?' checked':''}" data-action="toggle" data-id="${t.id}">
        ${t.done?`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`:''}
      </button>
      <div class="todo-priority" style="background:${PRIORITA[t.priority||'media']}"></div>
      <span class="todo-text${t.done?' barrato':''}">${t.text}</span>
      <button class="todo-delete" data-action="delete" data-id="${t.id}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`).join('');

  root.innerHTML=`
    <div class="todo-add-row">
      <input class="todo-input" id="todoInput" placeholder="Aggiungi un'attività…"/>
      <select id="todoPri" class="todo-select">
        <option value="alta">Alta</option>
        <option value="media" selected>Media</option>
        <option value="bassa">Bassa</option>
      </select>
      <button class="btn-primary" id="addTodo">Aggiungi</button>
    </div>
    <div class="todo-section-label">In corso <span class="todo-count-badge">${attivi.length}</span></div>
    <div class="todo-list">${attivi.length?lista(attivi):'<div class="todo-empty">Nessuna attività attiva 🎉</div>'}</div>
    <div class="todo-section-label" style="margin-top:4px">Completate <span class="todo-count-badge">${fatti.length}</span></div>
    <div class="todo-list">${fatti.length?lista(fatti):'<div class="todo-empty">Nessuna attività completata ancora</div>'}</div>`;

  root.querySelector('#addTodo').addEventListener('click', () => {
    const inp=root.querySelector('#todoInput'), pri=root.querySelector('#todoPri').value, txt=inp.value.trim();
    if(!txt) return;
    todos.set([...todos.value,{id:Date.now(),text:txt,done:false,priority:pri}]);
    inp.value=''; renderTodo(root);
  });
  root.querySelector('#todoInput').addEventListener('keydown', e => { if(e.key==='Enter') root.querySelector('#addTodo').click(); });
  root.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', () => {
    const id=parseInt(el.dataset.id);
    if(el.dataset.action==='toggle') todos.set(todos.value.map(t=>t.id===id?{...t,done:!t.done}:t));
    else todos.set(todos.value.filter(t=>t.id!==id));
    renderTodo(root);
  }));
}

/* ═══════════════════════════════
   NOTE
═══════════════════════════════ */
const NOTE_COLORI = ['#fef08a','#bbf7d0','#bfdbfe','#fecaca','#e9d5ff'];
const NOTE_NOMI   = ['Giallo','Verde','Azzurro','Rosa','Viola'];

function renderNote(root) {
  const card = n => `
    <div class="sticky-card" data-id="${n.id}" style="background:${n.color}">
      <div class="sticky-toolbar">
        ${NOTE_COLORI.map((c,i)=>`
          <div class="note-swatch${c===n.color?' attivo':''}" style="background:${c}"
            title="${NOTE_NOMI[i]}" data-action="color" data-id="${n.id}" data-color="${c}"></div>`).join('')}
        <button class="note-delete-btn" data-action="delete" data-id="${n.id}">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <textarea class="note-content" placeholder="Scrivi qui…" data-action="edit" data-id="${n.id}">${n.text}</textarea>
      <div class="note-timestamp">${n.ts}</div>
    </div>`;

  root.innerHTML=`
    <div class="notes-header">
      <div style="font-family:var(--font-display);font-size:15px;font-weight:700">
        ${notes.value.length} ${notes.value.length===1?'nota':'note'}
      </div>
    </div>
    <div class="notes-grid">
      <div class="add-note-card" id="addNota">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuova nota
      </div>
      ${notes.value.map(card).join('')}
    </div>`;

  root.querySelector('#addNota').addEventListener('click', () => {
    const n={id:Date.now(),text:'',color:NOTE_COLORI[Math.floor(Math.random()*5)],
      ts:new Date().toLocaleDateString('it-IT',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})};
    notes.set([n,...notes.value]); renderNote(root);
    setTimeout(()=>root.querySelector(`[data-id="${n.id}"] .note-content`)?.focus(),50);
  });
  root.querySelectorAll('[data-action]').forEach(el => {
    const id=parseInt(el.dataset.id);
    if(el.dataset.action==='delete')
      el.addEventListener('click',()=>{notes.set(notes.value.filter(n=>n.id!==id));renderNote(root);});
    else if(el.dataset.action==='color')
      el.addEventListener('click',()=>{notes.set(notes.value.map(n=>n.id===id?{...n,color:el.dataset.color}:n));renderNote(root);});
    else if(el.dataset.action==='edit')
      el.addEventListener('input',()=>{notes.set(notes.value.map(n=>n.id===id?{...n,text:el.value}:n));});
  });
}
